name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Lint & build place file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rojo
        run: |
          curl -sL -o rojo.zip https://github.com/rojo-rbx/rojo/releases/download/v7.4.4/rojo-7.4.4-linux-x86_64.zip
          unzip -o rojo.zip rojo
          chmod +x rojo

      - name: Install Selene
        run: |
          curl -sL -o selene.zip https://github.com/Kampfkarren/selene/releases/download/0.27.1/selene-0.27.1-linux.zip
          unzip -o selene.zip
          chmod +x selene

      - name: Lint (selene)
        run: |
          ./selene generate-roblox-std
          ./selene src

      - name: Build place file (rojo)
        run: ./rojo build -o AdventurerTavern.rbxlx

      - name: Upload place file artifact
        uses: actions/upload-artifact@v4
        with:
          name: AdventurerTavern-place
          path: AdventurerTavern.rbxlx
